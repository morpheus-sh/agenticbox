name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Rust: check, test, lint ──────────────────────────────────
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default members — daemon + crates, skip Tauri desktop)
        run: cargo clippy -p daemon -p agenticbox-cli -p fs-guard -p model-router -p network-control -p policy-engine -p sandbox-core -p session-manager -p shared-types -p tool-protocol -p agent-loop -- -D warnings

      - name: Build (default members)
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose
