# Pi Agent — edge/IoT coding agent from pi.dev
# Copy to ~/.agenticbox/agents/pi/ to use: `agenticbox run pi`
# Docs: https://github.com/morpheus-sh/agenticbox/blob/main/docs/agents.md

name = "pi"
description = "Pi Agent — edge computing, IoT device management"

command = "pi"

[model]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[permissions]
terminal = true
filesystem = "readwrite"
browser = false
network = "allowlist"
domains = ["pi.dev", "registry.npmjs.org", "api.anthropic.com"]

[image]
base = "node:22-slim"
setup = ["apt-get update && apt-get install -y curl", "curl -fsSL https://pi.dev/install.sh | sh"]